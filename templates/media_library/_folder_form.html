{% comment %}Inline form for creating a new folder. Expects: workspace{% endcomment %}

<form hx-post="{% url 'media_library:folder_create' workspace_id=workspace.id %}"
      hx-target="#folder-tree"
      hx-swap="innerHTML"
      @htmx:after-request="showNewFolder = false"
      class="flex items-center gap-1.5">
  <input type="text" name="name" placeholder="Folder name..."
         class="flex-1 text-sm px-2.5 py-1.5 border rounded-lg outline-none"
         style="border-color: var(--border, #E7E5E4);"
         onfocus="this.style.borderColor='var(--primary)'; this.style.boxShadow='0 0 0 3px var(--primary-ring)'"
         onblur="this.style.borderColor='var(--border)'; this.style.boxShadow='none'"
         required autofocus
         @keydown.escape="showNewFolder = false">
  <button type="submit"
          class="w-7 h-7 rounded-lg flex items-center justify-center flex-shrink-0 text-white transition-colors"
          style="background: var(--primary, #F97316);">
    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>
  </button>
  <button type="button" @click="showNewFolder = false"
          class="w-7 h-7 rounded-lg flex items-center justify-center flex-shrink-0 transition-colors"
          style="color: var(--text-ghost, #A8A29E);"
          onmouseenter="this.style.background='var(--surface-2)'"
          onmouseleave="this.style.background='transparent'">
    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
  </button>
</form>
